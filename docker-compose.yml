# AQAP — Agent Quality Assurance
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    container_name: aqap-redis

  engine:
    build: .
    container_name: aqap-engine
    depends_on:
      - redis
    environment:
      - AQAP_CONFIG=/app/config.yaml
    volumes:
      - ./aqap:/app/aqap
      - ./config.yaml:/app/config.yaml
    command: ["python", "-m", "aqap.core.engine"]
