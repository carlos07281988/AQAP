# AQAP — Agent Quality Assurance
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    container_name: aqap-redis

  engine:
    build: .
    container_name: aqap-engine
    depends_on:
      - redis
    environment:
      - AQAP_CONFIG=/app/config.yaml
    volumes:
      - ./aqap:/app/aqap
      - ./config.yaml:/app/config.yaml
    command: ["python", "-m", "aqap"]
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; asyncio.run(__import__('aqap.core.engine', fromlist=['AQAPEngine']).AQAPEngine().health())"]
      interval: 30s
      timeout: 5s
      retries: 3
